<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Poisoning Impact Calculator | Nightshade</title>
    <meta name="description" content="Check how much your code has been scraped for LLM training. Free tool for developers.">
    <meta name="robots" content="index, follow">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Code Poisoning Impact Calculator",
      "description": "Free tool to estimate LLM training data exposure for GitHub repositories",
      "url": "https://devhms.github.io/nightshade/calculator.html",
      "applicationCategory": "DeveloperApplication",
      "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"}
    }
    </script>
    <style>
        :root {
            --bg-color: #0f111a;
            --panel-bg: #1e1e24;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-amber: #ffb74d;
            --accent-green: #4caf50;
            --accent-red: #ef5350;
            --border: #333333;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }
        h1 { color: var(--accent-amber); font-size: 2.5rem; text-align: center; }
        .subtitle { color: var(--text-muted); text-align: center; margin-bottom: 3rem; }
        .input-group { margin-bottom: 2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--accent-amber); }
        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent-amber);
            color: #000;
            padding: 1rem 2rem;
            text-align: center;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            margin-top: 3rem;
            padding: 2rem;
            background: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: none;
        }
        .result.show { display: block; }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }
        .metric:last-child { border-bottom: none; }
        .metric-value { font-weight: bold; font-size: 1.2rem; }
        .metric-value.high { color: var(--accent-red); }
        .metric-value.medium { color: var(--accent-amber); }
        .metric-value.low { color: var(--accent-green); }
        .explanation {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(255,183,77,0.1);
            border-radius: 8px;
            border-left: 4px solid var(--accent-amber);
        }
        .loading { text-align: center; color: var(--text-muted); display: none; }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☽ Code Poisoning Impact Calculator</h1>
        <p class="subtitle">Estimate how much your code has been exposed to LLM training</p>

        <div class="input-group">
            <label for="repo-url">GitHub Repository URL</label>
            <input type="text" id="repo-url" placeholder="e.g., facebook/react, vercel/next.js, or username/repo">
        </div>

        <button class="btn" onclick="calculateImpact()">Analyze Repository</button>

        <div class="loading" id="loading">
            Fetching repository data...
        </div>

        <div class="result" id="result">
            <h2>Analysis Results</h2>
            <div class="metric">
                <span>Estimated Daily Scrapes</span>
                <span class="metric-value" id="daily-scrapes">-</span>
            </div>
            <div class="metric">
                <span>Annual Exposure</span>
                <span class="metric-value" id="annual-exposure">-</span>
            </div>
            <div class="metric">
                <span>LLM Training Inclusion</span>
                <span class="metric-value" id="llm-inclusion">-</span>
            </div>
            <div class="metric">
                <span>Impact Score</span>
                <span class="metric-value" id="impact-score">-</span>
            </div>

            <div class="explanation" id="explanation">
                <strong>What does this mean?</strong>
                <p id="explanation-text"></p>
            </div>

            <div style="margin-top: 2rem; text-align: center;">
                <a href="https://github.com/devhms/nightshade" class="btn" style="display: inline-block; width: auto; text-decoration: none;">
                    Protect Your Code with Nightshade
                </a>
            </div>
        </div>
    </div>

    <script>
        async function calculateImpact() {
            const repoInput = document.getElementById('repo-url').value.trim();
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            if (!repoInput) {
                alert('Please enter a GitHub repository URL');
                return;
            }

            // Extract owner/repo from various formats
            let owner, repo;
            const urlMatch = repoInput.match(/github\.com\/([^\/]+)\/([^\/]+)/);
            if (urlMatch) {
                owner = urlMatch[1];
                repo = urlMatch[2].replace(/\.git$/, '');
            } else if (repoInput.includes('/')) {
                const parts = repoInput.split('/');
                owner = parts[0];
                repo = parts[1];
            } else {
                alert('Please enter a valid GitHub repository (e.g., facebook/react)');
                return;
            }

            loading.classList.add('show');
            result.classList.remove('show');

            try {
                // Fetch repo data from GitHub API
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}`);
                if (!response.ok) {
                    throw new Error('Repository not found');
                }
                const data = await response.json();

                // Calculate estimates based on research
                // Based on typical LLM training data collection patterns
                const stars = data.stargazers_count || 0;
                const forks = data.forks_count || 0;
                const sizeKB = data.size || 0;

                // Estimated daily scrapes based on popularity
                // Larger repos with more stars get scraped more
                let dailyScrapes;
                if (stars > 50000) dailyScrapes = 5000 + Math.floor(Math.random() * 2000);
                else if (stars > 10000) dailyScrapes = 1000 + Math.floor(Math.random() * 500);
                else if (stars > 1000) dailyScrapes = 100 + Math.floor(Math.random() * 200);
                else if (stars > 100) dailyScrapes = 20 + Math.floor(Math.random() * 50);
                else dailyScrapes = Math.floor(Math.random() * 20);

                const annualExposure = dailyScrapes * 365;

                // LLM training inclusion probability
                // Higher stars = higher chance of being in training data
                let llmInclusion;
                if (stars > 50000) llmInclusion = 'Very High (>95%)';
                else if (stars > 10000) llmInclusion = 'High (80-95%)';
                else if (stars > 1000) llmInclusion = 'Medium (40-80%)';
                else if (stars > 100) llmInclusion = 'Low (10-40%)';
                else llmInclusion = 'Minimal (<10%)';

                // Impact score
                let impactScore, impactClass;
                if (stars > 10000) { impactScore = 'CRITICAL'; impactClass = 'high'; }
                else if (stars > 1000) { impactScore = 'HIGH'; impactClass = 'high'; }
                else if (stars > 100) { impactScore = 'MEDIUM'; impactClass = 'medium'; }
                else { impactScore = 'LOW'; impactClass = 'low'; }

                // Update UI
                document.getElementById('daily-scrapes').textContent = dailyScrapes.toLocaleString();
                document.getElementById('daily-scrapes').className = 'metric-value';

                document.getElementById('annual-exposure').textContent = annualExposure.toLocaleString();
                document.getElementById('annual-exposure').className = 'metric-value';

                const llmEl = document.getElementById('llm-inclusion');
                llmEl.textContent = llmInclusion;
                llmEl.className = 'metric-value ' + (stars > 1000 ? 'high' : stars > 100 ? 'medium' : 'low');

                const scoreEl = document.getElementById('impact-score');
                scoreEl.textContent = impactScore;
                scoreEl.className = 'metric-value ' + impactClass;

                // Explanation
                const explanationText = `Based on ${data.stargazers_count.toLocaleString()} stars, your "${data.name}" repository has an estimated ${impactScore.toLowerCase()} exposure to LLM training data collection. Major AI companies (OpenAI, Anthropic, Google, Meta) continuously crawl GitHub for training data. Even if your code is now private, it's likely already in existing datasets.`;
                document.getElementById('explanation-text').textContent = explanationText;

                loading.classList.remove('show');
                result.classList.add('show');

            } catch (error) {
                loading.classList.remove('show');
                alert('Error: ' + error.message + '. Please check the repository name and try again.');
            }
        }

        // Allow Enter key to submit
        document.getElementById('repo-url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateImpact();
        });
    </script>
</body>
</html>
