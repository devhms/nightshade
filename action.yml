name: 'Nightshade Obfuscator'
description: 'Protects Java/Python/JS code from LLM crawlers using semantic poisoning before deployment'
branding:
  icon: 'shield'
  color: 'purple'
inputs:
  input-dir:
    description: 'Directory containing source code to obfuscate'
    required: true
    default: './src'
  output-dir:
    description: 'Output directory for obfuscated code'
    required: true
    default: './obfuscated-src'
  strategies:
    description: 'Comma-separated list of poisoning strategies (all, entropy, deadcode, comments, strings, whitespace, semantic, controlflow, watermark)'
    required: false
    default: 'all'
  verify:
    description: 'Whether to run post-obfuscation Java compilation verification'
    required: false
    default: 'true'
version:
    description: 'Nightshade version to use'
    required: false
    default: '3.5.0'
  entropy-threshold:
    description: 'Entropy threshold for early-exit (0.0-1.0)'
    required: false
    default: '0.65'
    runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Download Nightshade Engine
      shell: bash
      run: |
        echo "[INFO] Downloading Nightshade v${{ inputs.version }}"
        curl -sL https://github.com/devhms/nightshade/releases/download/v${{ inputs.version }}/nightshade-${{ inputs.version }}-all.jar -o ${{ runner.temp }}/nightshade.jar

    - name: Run Nightshade
      shell: bash
      run: |
        VERIFY_FLAG=""
        if [ "${{ inputs.verify }}" == "true" ]; then
          VERIFY_FLAG="--verify"
        fi
        
        java -jar ${{ runner.temp }}/nightshade.jar -i ${{ inputs.input-dir }} -o ${{ inputs.output-dir }} -s ${{ inputs.strategies }} --threshold ${{ inputs.entropy-threshold }} $VERIFY_FLAG
