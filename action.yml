name: 'Nightshade Obfuscator'
description: 'Protects Java/Python/JS code from LLM crawlers using semantic poisoning before deployment'
branding:
  icon: 'shield'
  color: 'purple'
inputs:
  input-dir:
    description: 'Directory containing source code to obfuscate'
    required: true
    default: './src'
  output-dir:
    description: 'Output directory for obfuscated code'
    required: true
    default: './obfuscated-src'
  strategies:
    description: 'Comma-separated list of poisoning strategies (all, entropy, deadcode, comments, strings, whitespace, semantic, controlflow, watermark)'
    required: false
    default: 'all'
  verify:
    description: 'Whether to run post-obfuscation Java compilation verification'
    required: false
    default: 'true'
  version:
    description: 'Nightshade version to use'
    required: false
    default: '3.5.0'
  entropy-threshold:
    description: 'Entropy threshold for early-exit (0.0-1.0)'
    required: false
    default: '0.65'
runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Download Nightshade Engine
      shell: bash
      env:
        NS_VERSION: ${{ inputs.version }}
      run: |
        echo "[INFO] Downloading Nightshade v$NS_VERSION"
        curl --fail --max-time 60 -sL "https://github.com/devhms/nightshade/releases/download/v$NS_VERSION/nightshade-$NS_VERSION-all.jar" -o "${{ runner.temp }}/nightshade.jar"

    - name: Run Nightshade
      shell: bash
      env:
        NS_INPUT: ${{ inputs.input-dir }}
        NS_OUTPUT: ${{ inputs.output-dir }}
        NS_STRATEGIES: ${{ inputs.strategies }}
        NS_THRESHOLD: ${{ inputs.entropy-threshold }}
        NS_VERIFY: ${{ inputs.verify }}
      run: |
        VERIFY_FLAG=""
        if [ "$NS_VERIFY" == "true" ]; then
          VERIFY_FLAG="--verify"
        fi
        
        java -jar "${{ runner.temp }}/nightshade.jar" \
          -i "$NS_INPUT" \
          -o "$NS_OUTPUT" \
          -s "$NS_STRATEGIES" \
          --threshold "$NS_THRESHOLD" \
          $VERIFY_FLAG
