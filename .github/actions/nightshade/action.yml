name: 'Nightshade Obfuscator'
description: 'Protects Java/Python/JS code from LLM crawlers using semantic poisoning before deployment'
inputs:
  input-dir:
    description: 'Directory containing source code to obfuscate'
    required: true
    default: './src'
  output-dir:
    description: 'Output directory for obfuscated code'
    required: true
    default: './obfuscated-src'
  strategies:
    description: 'Comma-separated list of poisoning strategies (all, entropy, deadcode, comments, strings, whitespace, semantic)'
    required: false
    default: 'all'
  verify:
    description: 'Whether to run post-obfuscation Java compilation verification'
    required: false
    default: 'true'
runs:
  using: 'composite'
  steps:
    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: Download Nightshade Engine
      shell: bash
      run: |
        # In a real scenario, this would download a release binary.
        # For this example, we assume nightshade-2.0.0-all.jar is built or available.
        echo "[INFO] Using Nightshade v3.0"
        
    - name: Run Nightshade
      shell: bash
      run: |
        VERIFY_FLAG=""
        if [ "${{ inputs.verify }}" == "true" ]; then
          VERIFY_FLAG="--verify"
        fi
        
        # We assume the jar is available at the root of the runner or built previously.
        # Here we just show the invocation.
        java -jar nightshade.jar -i ${{ inputs.input-dir }} -o ${{ inputs.output-dir }} -s ${{ inputs.strategies }} $VERIFY_FLAG
