name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 3.5.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Fat JAR
        run: mvn clean package -DskipTests -B

      - name: Rename Artifact
        run: mv target/nightshade-*-all.jar nightshade-${{ github.event.inputs.version }}.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: |
            ## Nightshade v${{ github.event.inputs.version }}
            Please see [CHANGELOG.md](CHANGELOG.md) for full release notes.
          files: |
            nightshade-${{ github.event.inputs.version }}.jar
          draft: false
          prerelease: false
