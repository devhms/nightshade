name: Welcome New Contributors
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue! We appreciate your feedback.
            
            While you wait, check out:
            - 📖 [Documentation](https://devhms.github.io/nightshade/)
            - 🛡️ [How Nightshade works](https://github.com/devhms/nightshade#how-it-works)
            - 💬 [Discussions](https://github.com/devhms/nightshade/discussions)
          pr-message: |
            🎉 Thanks for your first PR! We're excited to review it.
            
            Please make sure:
            - Tests pass (`mvn test`)
            - Code follows existing style
            - CHANGELOG.md is updated if needed
